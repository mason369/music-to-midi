name: 同步到 Hugging Face Spaces

on:
  push:
    branches: [master]
    paths:
      - 'src/core/**'
      - 'src/__init__.py'
      - 'src/models/**'
      - 'src/utils/**'
      - 'src/i18n/**'
      - 'src/gui/web/**'
      - 'space/**'
      - 'YourMT3/amt/src/**'
      - 'download_sota_models.py'
      - 'download_multistem_model.py'
      - 'download_vocal_model.py'
      - 'download_accompaniment_model.py'
      - 'download_vocal_harmony_model.py'
      - 'download_transkun_v2_aug_model.py'
      - 'download_miros_model.py'
      - 'download_aria_amt_model.py'
      - 'download_bytedance_piano_model.py'
      - 'download_muscriptor_model.py'
      - 'download_fluidsynth_runtime.py'
      - 'packages.txt'
      - 'pyproject.toml'
      - 'LICENSE'
      - 'THIRD_PARTY_NOTICES.md'

  # 支持手动触发
  workflow_dispatch:

jobs:
  sync:
    name: 同步到 HF Space
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 构建 Space 目录并推送
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          WORK="/tmp/hf_space"
          rm -rf "$WORK"
          mkdir -p "$WORK/src" "$WORK/YourMT3/amt"

          # ── 根文件 ──
          cp space/app.py          "$WORK/"
          cp space/requirements.txt "$WORK/"
          cp space/README.md       "$WORK/"
          cp download_sota_models.py "$WORK/"
          cp download_multistem_model.py "$WORK/"
          cp download_vocal_model.py "$WORK/"
          cp download_accompaniment_model.py "$WORK/"
          cp download_vocal_harmony_model.py "$WORK/"
          cp download_transkun_v2_aug_model.py "$WORK/"
          cp download_miros_model.py "$WORK/"
          cp download_aria_amt_model.py "$WORK/"
          cp download_bytedance_piano_model.py "$WORK/"
          cp download_muscriptor_model.py "$WORK/"
          cp download_fluidsynth_runtime.py "$WORK/"
          cp packages.txt          "$WORK/"
          cp pyproject.toml        "$WORK/"
          cp LICENSE               "$WORK/"
          cp THIRD_PARTY_NOTICES.md "$WORK/"

          # ── 核心源码（排除桌面 Qt GUI，保留三端共用的 Web 混音运行时） ──
          cp src/__init__.py "$WORK/src/"
          for dir in core models utils i18n; do
            cp -r "src/$dir" "$WORK/src/"
          done
          mkdir -p "$WORK/src/gui"
          cp src/gui/__init__.py "$WORK/src/gui/"
          cp -r src/gui/web "$WORK/src/gui/"

          # ── 三端共用的 YourMT3 新 Torch/Transformers 兼容补丁源码 ──
          cp -r YourMT3/amt/src "$WORK/YourMT3/amt/"

          # ── 清理不需要的文件 ──
          find "$WORK" -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

          # ── 推送到 HF Space ──
          cd "$WORK"
          git init -b main
          git lfs install
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add space "https://mason369:${HF_TOKEN}@huggingface.co/spaces/mason369/music-to-midi"
          git add .
          git commit -m "sync: $(git -C $GITHUB_WORKSPACE log -1 --format='%h %s')"
          git push space main --force
