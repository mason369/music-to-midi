name: 构建应用程序

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    name: 构建 Windows 版本
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          choco install ffmpeg -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 使用 PyInstaller 构建
        run: |
          pyinstaller MusicToMidi.spec

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: MusicToMidi-Windows
          path: dist/

  test:
    name: 运行测试
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          choco install ffmpeg -y

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 运行代码检查
        run: |
          pip install flake8
          flake8 src/ --max-line-length=100 --ignore=E501,W503

      - name: 运行测试
        run: |
          pytest tests/ -v --tb=short || true
