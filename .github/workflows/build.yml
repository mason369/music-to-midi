name: 构建应用程序

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    name: 构建 Linux 版本
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            libsndfile1 \
            libportaudio2 \
            portaudio19-dev \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-util1 \
            libgl1 \
            fonts-ubuntu \
            fonts-dejavu-core \
            xvfb

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch==2.4.0 torchaudio==2.4.0 \
            --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 使用 PyInstaller 构建
        run: |
          pyinstaller MusicToMidi.spec

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: MusicToMidi-Linux
          path: dist/

  test:
    name: 运行测试
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            libsndfile1 \
            libportaudio2 \
            portaudio19-dev \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libgl1 \
            xvfb

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch==2.4.0 torchaudio==2.4.0 \
            --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 运行代码检查
        run: |
          pip install flake8
          flake8 src/ --max-line-length=100 --ignore=E501,W503

      - name: 运行测试
        env:
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 1
          pytest tests/ -v --tb=short || true
