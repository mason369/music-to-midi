name: 发布版本

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要上传资源的 Release 标签（如 v1.0.0），留空则上传到最新 Release'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            variant: CPU
            platform: Windows
            pytorch_url: https://download.pytorch.org/whl/cpu
            sep: ";"
          - os: windows-latest
            variant: GPU
            platform: Windows
            pytorch_url: https://download.pytorch.org/whl/cu121
            sep: ";"
          - os: ubuntu-22.04
            variant: CPU
            platform: Linux
            pytorch_url: https://download.pytorch.org/whl/cpu
            sep: ":"
          - os: ubuntu-22.04
            variant: GPU
            platform: Linux
            pytorch_url: https://download.pytorch.org/whl/cu121
            sep: ":"

    runs-on: ${{ matrix.os }}
    name: 构建 ${{ matrix.platform }}-${{ matrix.variant }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装系统依赖 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            libsndfile1 \
            libportaudio2 \
            portaudio19-dev \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-util1 \
            libgl1 \
            fonts-ubuntu \
            fonts-dejavu-core

      - name: 安装 FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: 安装 Python 依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python - <<'PY'
          from pathlib import Path

          skip_prefixes = (
              "torch",
              "torchaudio",
              "torchvision",
              "numpy",
              "audio-separator",
              "pytorch-lightning",
              "torchmetrics",
              "onnxruntime",
          )
          requirements = Path("requirements.txt").read_text(encoding="utf-8").splitlines()
          filtered = [
              line for line in requirements
              if not any(line.strip().startswith(prefix) for prefix in skip_prefixes)
          ]
          target = Path(".tmp/requirements-build.txt")
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text("\n".join(filtered) + "\n", encoding="utf-8")
          PY
          pip install numpy==1.26.4
          pip install -r .tmp/requirements-build.txt
          pip install torch==2.4.0 torchaudio==2.4.0 torchvision==0.19.0 --index-url ${{ matrix.pytorch_url }}
          pip install Pillow==12.0.0 pytorch-lightning==2.6.1 torchmetrics==1.8.2 onnxruntime==1.23.2
          pip install beartype==0.18.5 diffq-fixed==0.2.4 julius==0.2.7 ml_collections==1.1.0 onnx-weekly==1.21.0.dev20260302 onnx2torch-py313==1.6.0 pydub==0.25.1 resampy==0.4.3 rotary-embedding-torch==0.6.5 samplerate==0.1.0 six==1.17.0
          pip install audio-separator==0.41.1 --no-deps
          pip install pyinstaller pytest

      - name: 运行便携发布回归测试
        run: |
          pytest -q tests/test_main_self_test.py tests/test_portable_release_contract.py tests/test_runtime_paths.py tests/test_yourmt3_availability_messages.py

      - name: 下载 AI 模型（打包到便携版）
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          # Windows: 确保 choco 安装的 FFmpeg 在 PATH 中（bash shell 可能未继承）
          if [ -d "/c/ProgramData/chocolatey/bin" ]; then
            export PATH="/c/ProgramData/chocolatey/bin:$PATH"
          fi
          echo "=== Download all official YourMT3+ model modes ==="
          python download_sota_models.py

          echo "=== Download BS-RoFormer ep368 vocal model ==="
          python download_vocal_model.py

          echo "=== Download BS-RoFormer SW multi-stem model ==="
          python download_multistem_model.py

          echo "=== Download Chorus BS-RoFormer model ==="
          python download_vocal_harmony_model.py

          echo "=== Download Aria-AMT piano model ==="
          python download_aria_amt_model.py

          echo "=== Download ByteDance pedal piano model ==="
          python download_bytedance_piano_model.py

          echo "=== Download MIROS MusicFM model ==="
          python download_miros_model.py

          echo "=== Verify downloaded models ==="
          echo "YourMT3+:"
          find ~/.cache/music_ai_models/yourmt3_all -name "*.ckpt" -exec ls -lh {} \;
          echo "Audio-Separator:"
          ls -lh ~/.music-to-midi/models/audio-separator/*.ckpt
          echo "Aria-AMT:"
          ls -lh ~/.cache/music_ai_models/aria_amt/*
          echo "ByteDance Piano:"
          ls -lh ~/.cache/music_ai_models/bytedance_piano/*
          echo "MIROS:"
          ls -lh external/ai4m-miros/model/musicfm/data/pretrained_msd.pt
          ls -lh external/ai4m-miros/logs/Multi_longer_seq_length_frozen_enc_silu/le2bzt53/checkpoints/last.ckpt
          python - <<'PY'
          from src.core.miros_transcriber import MirosTranscriber
          reason = MirosTranscriber.get_unavailable_reason()
          if reason:
              raise RuntimeError(reason)
          if not MirosTranscriber.is_model_available():
              raise RuntimeError("MIROS model files are not available")
          print("MIROS available")
          PY

      - name: 修复 Torch OpenMP 运行时 (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install zstandard
          python tools/repair_torch_openmp.py

      - name: 准备 Linux 便携打包资源
        if: runner.os == 'Linux'
        shell: bash
        run: |
          BUILD_ASSET_ROOT="$GITHUB_WORKSPACE/build/portable_assets"
          mkdir -p "$BUILD_ASSET_ROOT"

          cp -a "$HOME/.music-to-midi/models/audio-separator" "$BUILD_ASSET_ROOT/audio-separator"

          cp -a "$HOME/.cache/music_ai_models/yourmt3_all" "$BUILD_ASSET_ROOT/yourmt3_all"

          cp -a "$HOME/.cache/music_ai_models/aria_amt" "$BUILD_ASSET_ROOT/aria_amt"

          cp -a "$HOME/.cache/music_ai_models/bytedance_piano" "$BUILD_ASSET_ROOT/bytedance_piano"

          cp -a "$GITHUB_WORKSPACE/external/ai4m-miros" "$BUILD_ASSET_ROOT/ai4m-miros"

          if command -v ffmpeg >/dev/null 2>&1; then
            mkdir -p "$BUILD_ASSET_ROOT/ffmpeg/bin"
            cp "$(command -v ffmpeg)" "$BUILD_ASSET_ROOT/ffmpeg/bin/ffmpeg"
          fi

          if command -v ffprobe >/dev/null 2>&1; then
            mkdir -p "$BUILD_ASSET_ROOT/ffmpeg/bin"
            cp "$(command -v ffprobe)" "$BUILD_ASSET_ROOT/ffmpeg/bin/ffprobe"
          fi

          echo "MUSIC_TO_MIDI_BUNDLE_AUDIO_SEPARATOR_DIR=$BUILD_ASSET_ROOT/audio-separator" >> "$GITHUB_ENV"
          echo "MUSIC_TO_MIDI_BUNDLE_YOURMT3_DIR=$BUILD_ASSET_ROOT/yourmt3_all" >> "$GITHUB_ENV"
          echo "MUSIC_TO_MIDI_BUNDLE_ARIA_DIR=$BUILD_ASSET_ROOT/aria_amt" >> "$GITHUB_ENV"
          echo "MUSIC_TO_MIDI_BUNDLE_BYTEDANCE_PIANO_DIR=$BUILD_ASSET_ROOT/bytedance_piano" >> "$GITHUB_ENV"
          echo "MUSIC_TO_MIDI_BUNDLE_MIROS_DIR=$BUILD_ASSET_ROOT/ai4m-miros" >> "$GITHUB_ENV"
          echo "MUSIC_TO_MIDI_BUNDLE_FFMPEG_DIR=$BUILD_ASSET_ROOT/ffmpeg" >> "$GITHUB_ENV"

      - name: 使用 build_portable.ps1 构建 (Windows)
        if: runner.os == 'Windows'
        run: pwsh -ExecutionPolicy Bypass -File .\build_portable.ps1

      - name: 使用 PyInstaller 构建 (Linux)
        if: runner.os == 'Linux'
        run: pyinstaller MusicToMidi.spec

      - name: 烟测便携产物 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $smokeDir = Join-Path $env:RUNNER_TEMP "MusicToMidi-smoke"
          $logs = Join-Path $smokeDir 'runtime\logs'
          if (Test-Path $smokeDir) {
            Remove-Item -LiteralPath $smokeDir -Recurse -Force
          }
          Copy-Item -LiteralPath '.\dist\MusicToMidi' -Destination $smokeDir -Recurse
          if (Test-Path $logs) {
            Remove-Item -LiteralPath $logs -Recurse -Force
          }
          $proc = Start-Process -FilePath (Join-Path $smokeDir 'MusicToMidi.exe') -ArgumentList '--self-test' -Wait -PassThru
          if (-not (Test-Path $logs)) {
            throw "Portable self-test did not produce runtime logs. ExitCode=$($proc.ExitCode)"
          }
          $latestLog = Get-ChildItem -LiteralPath $logs -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $latestLog) {
            throw "Portable self-test did not produce a log file. ExitCode=$($proc.ExitCode)"
          }
          $logText = Get-Content -LiteralPath $latestLog -Raw
          if ($logText -notmatch '便携包自检通过') {
            throw "Portable self-test failed. ExitCode=$($proc.ExitCode)`n$logText"
          }

      - name: 烟测便携产物 (Linux)
        if: runner.os == 'Linux'
        run: |
          SMOKE_DIR="$(mktemp -d "${RUNNER_TEMP:-/tmp}/MusicToMidi-smoke.XXXXXX")"
          cp -a ./dist/MusicToMidi/. "$SMOKE_DIR/"
          chmod +x "$SMOKE_DIR/MusicToMidi"
          "$SMOKE_DIR/MusicToMidi" --self-test

      - name: 创建便携包 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "MusicToMidi-${{ matrix.platform }}-${{ matrix.variant }}"
          for ($attempt = 1; $attempt -le 10; $attempt++) {
            try {
              Move-Item -LiteralPath 'dist/MusicToMidi' -Destination "dist/$name"
              break
            } catch {
              if ($attempt -eq 10) {
                throw
              }
              Start-Sleep -Seconds 3
            }
          }

          if ('${{ matrix.variant }}' -eq 'GPU') {
            $variantNote = @"
          GPU 版（CUDA 12.1），支持 NVIDIA 显卡加速
          如果没有 NVIDIA 显卡，或当前显卡与内置 PyTorch/CUDA 不兼容，程序会自动回退到 CPU 推理
          "@
          } else {
            $variantNote = @"
          CPU 版，无需显卡即可运行
          如需 GPU 加速，请下载 GPU 版本
          "@
          }

          $readme = @"
          音乐转MIDI转换器 ${{ matrix.platform }} 便携版（${{ matrix.variant }}）

          使用方法：
            运行 MusicToMidi.exe 即可启动（AI 模型已内置，无需额外下载）

          $variantNote

          支持格式：MP3, WAV, FLAC, OGG, M4A 等
          输出格式：多轨道 MIDI（128 种 GM 乐器）

          无需安装 Python，解压即用
          "@
          Set-Content -LiteralPath "dist/$name/使用说明.txt" -Value $readme -Encoding UTF8

      - name: 创建便携包 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          NAME="MusicToMidi-${{ matrix.platform }}-${{ matrix.variant }}"
          # 重命名 dist/MusicToMidi 为带平台标识的名称
          mv dist/MusicToMidi "dist/${NAME}"

          if [ "${{ matrix.variant }}" = "GPU" ]; then
            VARIANT_NOTE="GPU 版（CUDA 12.1），支持 NVIDIA 显卡加速
          如果没有 NVIDIA 显卡，或当前显卡与内置 PyTorch/CUDA 不兼容，程序会自动回退到 CPU 推理"
          else
            VARIANT_NOTE="CPU 版，无需显卡即可运行
          如需 GPU 加速，请下载 GPU 版本"
          fi

          if [ "${{ matrix.platform }}" = "Windows" ]; then
            EXE="MusicToMidi.exe"
          else
            EXE="MusicToMidi"
            chmod +x "dist/${NAME}/${EXE}"
          fi

          cat > "dist/${NAME}/使用说明.txt" << HEREDOC
          音乐转MIDI转换器 ${{ matrix.platform }} 便携版（${{ matrix.variant }}）

          使用方法：
            运行 ${EXE} 即可启动（AI 模型已内置，无需额外下载）

          ${VARIANT_NOTE}

          支持格式：MP3, WAV, FLAC, OGG, M4A 等
          输出格式：多轨道 MIDI（128 种 GM 乐器）

          无需安装 Python，解压即用
          HEREDOC

      - name: 压缩便携包
        shell: bash
        run: |
          NAME="MusicToMidi-${{ matrix.platform }}-${{ matrix.variant }}"
          echo "压缩前磁盘空间:"
          df -h .

          # PyInstaller 构建完成后，build/ 中的中间产物和 staged model assets
          # 已经复制进 dist/${NAME}，压缩前清掉它们以降低 runner 磁盘峰值。
          rm -rf build
          rm -rf "$HOME/.cache/pip" "$HOME/.cache/torch" "$HOME/.cache/music_ai_models" "$HOME/.music-to-midi"
          echo "清理构建缓存后磁盘空间:"
          df -h .

          if [ "${{ matrix.platform }}" = "Windows" ]; then
            # 先检查未压缩目录大小，避免对大包做无意义的多轮压缩
            DIR_SIZE=$(du -sb "dist/${NAME}" | cut -f1)
            echo "未压缩目录大小: $(( DIR_SIZE / 1048576 )) MB"
            if [ "$DIR_SIZE" -gt 3000000000 ]; then
              # >3GB 目录直接用分卷 7z（跳过 zip 和单文件 7z）
              echo "目录较大，直接使用分卷 7z 压缩..."
              cd dist && 7z a -v1900m "../${NAME}-Portable.7z" "${NAME}" && cd ..
            else
              # 小包先试 zip
              cd dist && 7z a -tzip "../${NAME}-Portable.zip" "${NAME}" && cd ..
              FILE_SIZE=$(stat -c%s "${NAME}-Portable.zip" 2>/dev/null || wc -c < "${NAME}-Portable.zip" | tr -d ' ')
              if [ "$FILE_SIZE" -gt 1900000000 ]; then
                rm "${NAME}-Portable.zip"
                cd dist && 7z a "../${NAME}-Portable.7z" "${NAME}" && cd ..
                SEVENZ_SIZE=$(stat -c%s "${NAME}-Portable.7z" 2>/dev/null || wc -c < "${NAME}-Portable.7z" | tr -d ' ')
                if [ "$SEVENZ_SIZE" -gt 1900000000 ]; then
                  rm "${NAME}-Portable.7z"
                  cd dist && 7z a -v1900m "../${NAME}-Portable.7z" "${NAME}" && cd ..
                fi
              fi
            fi
          else
            # Linux GPU 包较大，直接流式写入分卷，避免先生成一个完整 tar.gz
            # 再 split 造成额外磁盘峰值。
            tar -czf - -C dist "${NAME}" | split -b 1900M - "${NAME}-Portable.tar.gz.part"
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: MusicToMidi-${{ matrix.platform }}-${{ matrix.variant }}
          path: MusicToMidi-${{ matrix.platform }}-${{ matrix.variant }}-Portable*

  release:
    name: 上传到 GitHub Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: 列出构建产物
        run: ls -lh MusicToMidi-*

      - name: 确定目标标签
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            LATEST=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName')
            echo "tag=${LATEST}" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建 Release（如不存在）
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if ! gh release view "${TAG}" --repo ${{ github.repository }} &>/dev/null; then
            gh release create "${TAG}" \
              --repo ${{ github.repository }} \
              --title "${TAG}" \
              --notes "## 音乐转MIDI转换器 ${TAG}

          ### 便携版下载

          | 文件 | 平台 | 推理方式 | 说明 |
          |------|------|----------|------|
          | \`MusicToMidi-Windows-GPU-Portable.*\` | Windows | GPU (CUDA 12.1) | 有 NVIDIA 显卡推荐 |
          | \`MusicToMidi-Windows-CPU-Portable.*\` | Windows | CPU | 无显卡使用 |
          | \`MusicToMidi-Linux-GPU-Portable.*\` | Linux | GPU (CUDA 12.1) | 有 NVIDIA 显卡推荐 |
          | \`MusicToMidi-Linux-CPU-Portable.*\` | Linux | CPU | 无显卡使用 |

          ### 使用方法
          1. 下载对应平台和推理方式的压缩包
          2. 如果是分卷压缩，请先下载同名前缀的全部分卷（如 \`.7z.001\` / \`.7z.002\` 或 \`.partaa\` / \`.partab\`）
          3. 解压到任意目录
          4. 运行 \`MusicToMidi\`（Windows 为 \`.exe\`）即可使用（AI 模型已内置）

          ### 说明
          - 无需安装 Python，解压即用
          - GPU 版内含 CUDA 12.1 运行时，无需单独安装 CUDA
          - GPU 版在没有 NVIDIA 显卡，或当前显卡与内置 PyTorch/CUDA 不兼容时会自动回退到 CPU
          - 支持 128 种 GM 乐器精确识别
          - 6 种处理模式：智能转写 / 人声分离 / 六声部分离 / Transkun 钢琴 / Aria-AMT 钢琴 / ByteDance Pedal 钢琴

          ### 系统要求
          - **Windows**：Windows 10/11 (x64)
          - **Linux**：Ubuntu 20.04+ / Debian 11+ (x64)
          - **GPU 版**：与内置 PyTorch/CUDA 兼容的 NVIDIA 显卡（不兼容时会自动回退到 CPU）
          - **内存**：建议 8GB+"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传资源到 Release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "上传资源到 Release: ${TAG}"
          mapfile -t FILES < <(find . -maxdepth 1 -name "MusicToMidi-*-Portable*" -type f | sort)
          upload_asset_with_retry() {
            local tag="$1"
            local file="$2"
            local attempt
            local exit_code

            for attempt in 1 2 3; do
              echo "上传(${attempt}/3): ${file}"
              if timeout 30m gh release upload "${tag}" "${file}" \
                --repo ${{ github.repository }} \
                --clobber; then
                return 0
              fi

              exit_code=$?
              echo "上传失败(退出码=${exit_code}): ${file}"
              if [ "${attempt}" -lt 3 ]; then
                sleep $(( attempt * 20 ))
              fi
            done

            echo "上传最终失败: ${file}"
            return 1
          }
          echo "找到以下文件："
          for f in "${FILES[@]}"; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            echo "  $f ($(( SIZE / 1048576 )) MB)"
          done
          for f in "${FILES[@]}"; do
            upload_asset_with_retry "${TAG}" "$f"
          done
          echo "全部上传完成"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
