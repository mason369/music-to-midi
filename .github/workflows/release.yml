name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: MusicToMidi-Windows
            asset_name: MusicToMidi-Windows.zip
          - os: macos-latest
            artifact_name: MusicToMidi-macOS
            asset_name: MusicToMidi-macOS.tar.gz
          - os: ubuntu-latest
            artifact_name: MusicToMidi-Linux
            asset_name: MusicToMidi-Linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 libportaudio2

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install ffmpeg libsndfile portaudio

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install ffmpeg -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --name MusicToMidi --windowed --onedir src/main.py

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path dist/MusicToMidi -DestinationPath ${{ matrix.asset_name }}

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czvf ${{ matrix.asset_name }} -C dist MusicToMidi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MusicToMidi-Windows
          path: ./artifacts/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: MusicToMidi-macOS
          path: ./artifacts/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: MusicToMidi-Linux
          path: ./artifacts/

      - name: List artifacts
        run: ls -la ./artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/MusicToMidi-Windows.zip
            ./artifacts/MusicToMidi-macOS.tar.gz
            ./artifacts/MusicToMidi-Linux.tar.gz
          body: |
            ## Music to MIDI Converter ${{ github.ref_name }}

            ### Downloads
            - **Windows**: MusicToMidi-Windows.zip
            - **macOS**: MusicToMidi-macOS.tar.gz
            - **Linux**: MusicToMidi-Linux.tar.gz

            ### Requirements
            - FFmpeg must be installed
            - NVIDIA GPU recommended for faster processing

            ### Changes
            See [CHANGELOG](https://github.com/mason369/music-to-midi/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
