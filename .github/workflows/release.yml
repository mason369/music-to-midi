name: 发布版本

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: 构建 Windows 版本
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          choco install ffmpeg -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 使用 PyInstaller 构建
        run: |
          pyinstaller --name MusicToMidi --windowed --onedir src/main.py

      - name: 创建压缩包
        run: |
          Compress-Archive -Path dist/MusicToMidi -DestinationPath MusicToMidi-Windows.zip

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: MusicToMidi-Windows
          path: MusicToMidi-Windows.zip

  release:
    name: 创建 GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 Windows 构建产物
        uses: actions/download-artifact@v4
        with:
          name: MusicToMidi-Windows
          path: ./artifacts/

      - name: 列出构建产物
        run: ls -la ./artifacts/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/MusicToMidi-Windows.zip
          body: |
            ## 音乐转MIDI转换器 ${{ github.ref_name }}

            ### 下载
            - **Windows**: MusicToMidi-Windows.zip

            ### 系统要求
            - 必须安装 FFmpeg
            - 推荐使用 NVIDIA GPU 以加速处理

            ### 平台支持
            - ✅ Windows - 已支持
            - 🚧 macOS - 计划中
            - 🚧 Linux - 计划中

            ### 更新日志
            查看 [CHANGELOG](https://github.com/mason369/music-to-midi/blob/main/CHANGELOG.md) 了解详情。
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
