name: 发布版本

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要上传资源的 Release 标签（如 v1.0.0），留空则上传到最新 Release'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            variant: GPU
            platform: Windows
            pytorch_url: https://download.pytorch.org/whl/cu128
            sep: ";"
          - os: ubuntu-22.04
            variant: GPU
            platform: Linux
            pytorch_url: https://download.pytorch.org/whl/cu128
            sep: ":"

    runs-on: ${{ matrix.os }}
    name: 构建 ${{ matrix.platform }}-${{ matrix.variant }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 阻断未解决的第三方许可证发布
        shell: bash
        run: |
          FAILED=0
          if grep -n "^RELEASE_BLOCKER_UNRESOLVED_LICENSE:" THIRD_PARTY_NOTICES.md; then
            echo "::error::THIRD_PARTY_NOTICES.md contains unresolved redistribution/license blockers. Portable release is forbidden until every marker is resolved."
            FAILED=1
          fi
          EXPECTED_COMPONENTS=(
            zfturbo_adapted_source
            yourmt3_checkpoints
            yourmt3_patched_source
            leap_xe
            polarformer
            bs_roformer_sw_fixed
            audio_separator
            transkun_source
            transkun_default_v2_weight
            transkun_v2_aug
            aria_amt_source
            aria_amt_checkpoint
            bytedance_inference
            bytedance_checkpoint
            miros_source
            musicfm_pretrained
            miros_finetuned
            pytorch_cuda_runtime
            onnxruntime_gpu
            pyqt6_runtime
            ffmpeg_runtime
            frozen_dependency_set
          )
          mapfile -t INVENTORY_LINES < <(grep '^PORTABLE_COMPONENT:' THIRD_PARTY_NOTICES.md || true)
          if [ "${#INVENTORY_LINES[@]}" -ne "${#EXPECTED_COMPONENTS[@]}" ]; then
            echo "::error::Portable license inventory count mismatch: expected ${#EXPECTED_COMPONENTS[@]}, got ${#INVENTORY_LINES[@]}"
            FAILED=1
          fi
          for component_id in "${EXPECTED_COMPONENTS[@]}"; do
            if ! grep -Fq "PORTABLE_COMPONENT: ${component_id} |" THIRD_PARTY_NOTICES.md; then
              echo "::error::Portable license inventory is missing required component: ${component_id}"
              FAILED=1
            fi
          done
          for inventory_line in "${INVENTORY_LINES[@]}"; do
            component_id=${inventory_line#PORTABLE_COMPONENT: }
            component_id=${component_id%% |*}
            if [[ " ${EXPECTED_COMPONENTS[*]} " != *" ${component_id} "* ]]; then
              echo "::error::Portable license inventory contains an unreviewed component ID: ${component_id}"
              FAILED=1
            fi
            if [[ ! "$inventory_line" =~ \|\ bundle=.+\ \|\ artifact=.+\ \|\ revision=.+\ \|\ license=.+\ \|\ status=(VERIFIED|BLOCKED|OWNER_ACCEPTED)$ ]]; then
              echo "::error::Malformed portable license inventory row: ${inventory_line}"
              FAILED=1
            elif [[ "$inventory_line" == *"| status=BLOCKED" ]]; then
              echo "::error::Portable component is not cleared for redistribution: ${component_id}"
              FAILED=1
            elif [[ "$inventory_line" == *"| status=OWNER_ACCEPTED" ]] && ! grep -Fq "OWNER_ACCEPTED_NOTICE: ${component_id}" THIRD_PARTY_NOTICES.md; then
              echo "::error::Owner-accepted component is missing its distribution record: ${component_id}"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装系统依赖 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            libsndfile1 \
            libportaudio2 \
            portaudio19-dev \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-util1 \
            libgl1 \
            libegl1 \
            fonts-ubuntu \
            fonts-dejavu-core

      - name: 安装 FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: 记录并校验实际打包的 FFmpeg
        shell: bash
        run: |
          mkdir -p .tmp
          if [ "${{ runner.os }}" = "Windows" ]; then
            FFMPEG_BIN="/c/ProgramData/chocolatey/lib/ffmpeg/tools/ffmpeg/bin/ffmpeg.exe"
            FFPROBE_BIN="/c/ProgramData/chocolatey/lib/ffmpeg/tools/ffmpeg/bin/ffprobe.exe"
            PACKAGE_SOURCE="Chocolatey ffmpeg package: https://community.chocolatey.org/packages/ffmpeg"
            PACKAGE_VERSION=$(choco list --exact ffmpeg --limit-output)
          else
            FFMPEG_BIN=$(readlink -f "$(command -v ffmpeg)")
            FFPROBE_BIN=$(readlink -f "$(command -v ffprobe)")
            PACKAGE_SOURCE="Ubuntu 22.04 apt ffmpeg source route: https://packages.ubuntu.com/jammy/ffmpeg"
            PACKAGE_VERSION=$(dpkg-query -W -f='${Package}=${Version}' ffmpeg)
          fi
          test -x "$FFMPEG_BIN" || { echo "Exact FFmpeg bundle executable missing: $FFMPEG_BIN" >&2; exit 1; }
          test -x "$FFPROBE_BIN" || { echo "Exact ffprobe bundle executable missing: $FFPROBE_BIN" >&2; exit 1; }

          BUILD_CONF=$("$FFMPEG_BIN" -hide_banner -buildconf 2>&1)
          if printf '%s\n' "$BUILD_CONF" | grep -F -- '--enable-nonfree'; then
            echo "::error::FFmpeg was built with --enable-nonfree and is not redistributable; refusing portable build."
            exit 1
          fi

          {
            echo "Package source: $PACKAGE_SOURCE"
            echo "Package version: $PACKAGE_VERSION"
            echo "Bundled ffmpeg path: $FFMPEG_BIN"
            echo "Bundled ffprobe path: $FFPROBE_BIN"
            echo
            echo "=== ffmpeg -version ==="
            "$FFMPEG_BIN" -version
            echo
            echo "=== ffmpeg -buildconf ==="
            "$FFMPEG_BIN" -hide_banner -buildconf
            echo
            echo "=== ffmpeg -L ==="
            "$FFMPEG_BIN" -hide_banner -L
            echo
            echo "=== SHA-256 ==="
            sha256sum "$FFMPEG_BIN" "$FFPROBE_BIN"
          } > .tmp/FFMPEG_BUILD_AUDIT.txt
          test -s .tmp/FFMPEG_BUILD_AUDIT.txt
          cat .tmp/FFMPEG_BUILD_AUDIT.txt

      - name: 安装 Python 依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python - <<'PY'
          from pathlib import Path

          skip_prefixes = (
              "torch",
              "torchaudio",
              "torchvision",
              "numpy",
              "audio-separator",
              "pytorch-lightning",
              "torchmetrics",
              "onnxruntime",
          )
          requirements = Path("requirements.txt").read_text(encoding="utf-8").splitlines()
          filtered = [
              line for line in requirements
              if not any(line.strip().startswith(prefix) for prefix in skip_prefixes)
          ]
          target = Path(".tmp/requirements-build.txt")
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text("\n".join(filtered) + "\n", encoding="utf-8")
          PY
          pip install numpy==1.26.4
          pip install -r .tmp/requirements-build.txt
          pip install torch==2.7.0 torchaudio==2.7.0 torchvision==0.22.0 --index-url ${{ matrix.pytorch_url }}
          pip install "aria-amt @ https://github.com/EleutherAI/aria-amt/archive/a1ab73fc901d1759ec3bc173c146b3c6a3040261.zip" --no-deps
          pip install Pillow==12.0.0 pytorch-lightning==2.6.1 torchmetrics==1.8.2 onnxruntime-gpu==1.23.2
          pip install beartype==0.18.5 diffq-fixed==0.2.4 julius==0.2.7 ml_collections==1.1.0 onnx-weekly==1.21.0.dev20260223 onnx2torch-py313==1.6.0 pydub==0.25.1 resampy==0.4.3 rotary-embedding-torch==0.6.5 samplerate==0.1.0 six==1.17.0
          pip install audio-separator==0.44.1 --no-deps
          pip install pyinstaller pytest

      - name: 运行便携发布回归测试
        run: |
          pytest -q tests/test_main_self_test.py tests/test_portable_release_contract.py tests/test_portable_model_asset_validator.py tests/test_runtime_paths.py tests/test_yourmt3_availability_messages.py tests/test_official_midi_routes.py

      - name: 下载 AI 模型（打包到便携版）
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Windows: 确保 choco 安装的 FFmpeg 在 PATH 中（bash shell 可能未继承）
          if [ -d "/c/ProgramData/chocolatey/bin" ]; then
            export PATH="/c/ProgramData/chocolatey/bin:$PATH"
          fi

          echo "=== Restore and strictly verify pinned MIROS before the aggregate downloader ==="
          WORKSPACE_DIR="$(pwd)"
          MIROS_PORTABLE_RELEASE_TAG="v1.0.16"
          MIROS_PORTABLE_ROOT="$WORKSPACE_DIR/.tmp/miros-portable"
          rm -rf "$MIROS_PORTABLE_ROOT" "$WORKSPACE_DIR/external/ai4m-miros"
          mkdir -p "$MIROS_PORTABLE_ROOT" "$WORKSPACE_DIR/external"
          MIROS_PORTABLE_PARTS="$WORKSPACE_DIR/.tmp/miros-portable-parts.tsv"
          gh release view "$MIROS_PORTABLE_RELEASE_TAG" \
            --repo ${{ github.repository }} \
            --json assets \
            -q '.assets[] | select(.name | startswith("MusicToMidi-Linux-GPU-Portable.tar.gz.part")) | [.name, .url] | @tsv' \
            | sort > "$MIROS_PORTABLE_PARTS"
          if [ ! -s "$MIROS_PORTABLE_PARTS" ]; then
            echo "::error::No Linux portable release parts found on ${MIROS_PORTABLE_RELEASE_TAG}; cannot restore the packaged MIROS checkpoint."
            exit 1
          fi
          echo "Streaming packaged MIROS backend from ${MIROS_PORTABLE_RELEASE_TAG}"
          (
            while IFS=$'\t' read -r asset_name asset_url; do
              echo "Streaming ${asset_name}" >&2
              curl -L --fail --retry 3 --retry-delay 5 "$asset_url"
            done < "$MIROS_PORTABLE_PARTS"
          ) | tar -xz -C "$MIROS_PORTABLE_ROOT" --wildcards "MusicToMidi-Linux-GPU/_internal/external/ai4m-miros/*"
          mv "$MIROS_PORTABLE_ROOT/MusicToMidi-Linux-GPU/_internal/external/ai4m-miros" "$WORKSPACE_DIR/external/ai4m-miros"
          test -f "$WORKSPACE_DIR/external/ai4m-miros/main.py"
          test -f "$WORKSPACE_DIR/external/ai4m-miros/transcribe.py"
          test -f "$WORKSPACE_DIR/external/ai4m-miros/model/musicfm/data/pretrained_msd.pt"
          test -f "$WORKSPACE_DIR/external/ai4m-miros/logs/Multi_longer_seq_length_frozen_enc_silu/le2bzt53/checkpoints/last.ckpt"
          python download_miros_model.py

          echo "=== Download all official YourMT3+ model modes; verify complete seven-mode assets: YourMT3+ (5 checkpoints), MIROS (source + pretrained + fine-tuned), BS-RoFormer SW Fixed, Leap XE, PolarFormer, TransKun 2.0.1 default V2, TransKun V2 Aug, Aria-AMT, and ByteDance Piano ==="
          python download_sota_models.py

          echo "=== Verify Leap XE 90-band vocals assets ==="
          python download_vocal_model.py

          echo "=== Verify BS-RoFormer SW six-stem assets (Fixed checkpoint) ==="
          python download_multistem_model.py --check-only

          echo "=== Verify PolarFormer accompaniment assets ==="
          python download_accompaniment_model.py

          echo "=== Verify TransKun V2 Aug checkpoint assets ==="
          python download_transkun_v2_aug_model.py

          echo "=== Download Aria-AMT piano model ==="
          python download_aria_amt_model.py

          echo "=== Download ByteDance pedal piano model ==="
          python download_bytedance_piano_model.py

          echo "=== Verify downloaded models ==="
          echo "YourMT3+:"
          find ~/.cache/music_ai_models/yourmt3_all -name "*.ckpt" -exec ls -lh {} \;
          echo "Audio-Separator:"
          find ~/.music-to-midi/models/audio-separator -maxdepth 3 -type f -exec ls -lh {} \;
          echo "TransKun V2 Aug:"
          find ~/.cache/music_ai_models/transkun_v2_aug -maxdepth 3 -type f -exec ls -lh {} \;
          echo "Aria-AMT:"
          ls -lh ~/.cache/music_ai_models/aria_amt/*
          echo "ByteDance Piano:"
          ls -lh ~/.cache/music_ai_models/bytedance_piano/*
          echo "MIROS:"
          ls -lh external/ai4m-miros/model/musicfm/data/pretrained_msd.pt
          ls -lh external/ai4m-miros/logs/Multi_longer_seq_length_frozen_enc_silu/le2bzt53/checkpoints/last.ckpt
          python - <<'PY'
          from src.core.miros_transcriber import MirosTranscriber
          reason = MirosTranscriber.get_unavailable_reason()
          if reason:
              raise RuntimeError(reason)
          if not MirosTranscriber.is_model_available():
              raise RuntimeError("MIROS model files are not available")
          print("MIROS available")
          PY

      - name: 修复 Torch OpenMP 运行时 (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install zstandard
          python tools/repair_torch_openmp.py

      - name: 准备 Linux 便携打包资源
        if: runner.os == 'Linux'
        shell: bash
        run: |
          BUILD_ASSET_ROOT="$GITHUB_WORKSPACE/build/portable_assets"
          mkdir -p "$BUILD_ASSET_ROOT"

          cp -a "$HOME/.music-to-midi/models/audio-separator" "$BUILD_ASSET_ROOT/audio-separator"

          cp -a "$HOME/.cache/music_ai_models/yourmt3_all" "$BUILD_ASSET_ROOT/yourmt3_all"

          cp -a "$HOME/.cache/music_ai_models/aria_amt" "$BUILD_ASSET_ROOT/aria_amt"

          cp -a "$HOME/.cache/music_ai_models/bytedance_piano" "$BUILD_ASSET_ROOT/bytedance_piano"

          cp -a "$HOME/.cache/music_ai_models/transkun_v2_aug" "$BUILD_ASSET_ROOT/transkun_v2_aug"

          cp -a "$GITHUB_WORKSPACE/external/ai4m-miros" "$BUILD_ASSET_ROOT/ai4m-miros"

          python tools/validate_portable_model_assets.py \
            --audio-separator-dir "$BUILD_ASSET_ROOT/audio-separator" \
            --yourmt3-dir "$BUILD_ASSET_ROOT/yourmt3_all" \
            --yourmt3-source-dir "$GITHUB_WORKSPACE/YourMT3/amt/src" \
            --aria-amt-dir "$BUILD_ASSET_ROOT/aria_amt" \
            --bytedance-piano-dir "$BUILD_ASSET_ROOT/bytedance_piano" \
            --miros-dir "$BUILD_ASSET_ROOT/ai4m-miros" \
            --label "staged Linux portable model assets"
          python download_multistem_model.py \
            --cache-dir "$BUILD_ASSET_ROOT/audio-separator" \
            --check-only
          TRANSKUN_V2_AUG_BUNDLE="$BUILD_ASSET_ROOT/transkun_v2_aug" python - <<'PY'
          import os
          from pathlib import Path

          from src.core.transkun_v2_aug_transcriber import (
              TRANSKUN_V2_AUG_MODEL_DIR_NAME,
              validate_transkun_v2_aug_model_files,
          )

          model_dir = (
              Path(os.environ["TRANSKUN_V2_AUG_BUNDLE"])
              / TRANSKUN_V2_AUG_MODEL_DIR_NAME
          )
          reason = validate_transkun_v2_aug_model_files(model_dir)
          if reason:
              raise RuntimeError(reason)
          print(f"TransKun V2 Aug staged assets verified: {model_dir}")
          PY

          FFMPEG_SOURCE="$(command -v ffmpeg)" || {
            echo "Required ffmpeg executable is missing" >&2
            exit 1
          }
          FFPROBE_SOURCE="$(command -v ffprobe)" || {
            echo "Required ffprobe executable is missing" >&2
            exit 1
          }
          mkdir -p "$BUILD_ASSET_ROOT/ffmpeg/bin"
          cp "$FFMPEG_SOURCE" "$BUILD_ASSET_ROOT/ffmpeg/bin/ffmpeg"
          cp "$FFPROBE_SOURCE" "$BUILD_ASSET_ROOT/ffmpeg/bin/ffprobe"
          test -s "$BUILD_ASSET_ROOT/ffmpeg/bin/ffmpeg"
          test -s "$BUILD_ASSET_ROOT/ffmpeg/bin/ffprobe"

          echo "MUSIC_TO_MIDI_BUNDLE_AUDIO_SEPARATOR_DIR=$BUILD_ASSET_ROOT/audio-separator" >> "$GITHUB_ENV"
          echo "MUSIC_TO_MIDI_BUNDLE_YOURMT3_DIR=$BUILD_ASSET_ROOT/yourmt3_all" >> "$GITHUB_ENV"
          echo "MUSIC_TO_MIDI_BUNDLE_ARIA_AMT_DIR=$BUILD_ASSET_ROOT/aria_amt" >> "$GITHUB_ENV"
          echo "MUSIC_TO_MIDI_BUNDLE_BYTEDANCE_PIANO_DIR=$BUILD_ASSET_ROOT/bytedance_piano" >> "$GITHUB_ENV"
          echo "MUSIC_TO_MIDI_BUNDLE_TRANSKUN_V2_AUG_DIR=$BUILD_ASSET_ROOT/transkun_v2_aug" >> "$GITHUB_ENV"
          echo "MUSIC_TO_MIDI_BUNDLE_MIROS_DIR=$BUILD_ASSET_ROOT/ai4m-miros" >> "$GITHUB_ENV"
          echo "MUSIC_TO_MIDI_BUNDLE_FFMPEG_DIR=$BUILD_ASSET_ROOT/ffmpeg" >> "$GITHUB_ENV"

      - name: 生成第三方 SBOM
        shell: bash
        run: python tools/generate_third_party_sbom.py --output THIRD_PARTY_SBOM.txt

      - name: 使用 build_portable.ps1 构建 (Windows)
        if: runner.os == 'Windows'
        run: pwsh -ExecutionPolicy Bypass -File .\build_portable.ps1

      - name: 使用 PyInstaller 构建 (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller MusicToMidi.spec
          cp LICENSE THIRD_PARTY_NOTICES.md THIRD_PARTY_SBOM.txt dist/MusicToMidi/

      - name: 烟测便携产物 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $smokeDir = Join-Path $env:RUNNER_TEMP "MusicToMidi-smoke"
          $logs = Join-Path $smokeDir 'runtime\logs'
          if (Test-Path $smokeDir) {
            Remove-Item -LiteralPath $smokeDir -Recurse -Force
          }
          Copy-Item -LiteralPath '.\dist\MusicToMidi' -Destination $smokeDir -Recurse
          if (Test-Path $logs) {
            Remove-Item -LiteralPath $logs -Recurse -Force
          }
          $SelfTestTimeoutSeconds = 900
          $selfTestExe = Join-Path $smokeDir 'MusicToMidi.exe'
          $proc = Start-Process -FilePath $selfTestExe -ArgumentList '--self-test-no-load' -PassThru
          if (-not $proc.WaitForExit($SelfTestTimeoutSeconds * 1000)) {
            try {
              $proc.Kill($true)
            } catch {
              $proc.Kill()
            }
            $logText = ""
            if (Test-Path $logs) {
              $latestTimeoutLog = Get-ChildItem -LiteralPath $logs -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1 -ExpandProperty FullName
              if ($latestTimeoutLog) {
                $logText = Get-Content -LiteralPath $latestTimeoutLog -Raw
              }
            }
            throw "Portable self-test timed out after ${SelfTestTimeoutSeconds}s.`n$logText"
          }
          if (-not (Test-Path $logs)) {
            throw "Portable self-test did not produce runtime logs. ExitCode=$($proc.ExitCode)"
          }
          $latestLog = Get-ChildItem -LiteralPath $logs -File | Sort-Object LastWriteTime -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $latestLog) {
            throw "Portable self-test did not produce a log file. ExitCode=$($proc.ExitCode)"
          }
          $logText = Get-Content -LiteralPath $latestLog -Raw
          if ($logText -notmatch '便携包自检通过') {
            throw "Portable self-test failed. ExitCode=$($proc.ExitCode)`n$logText"
          }
          $mirosDir = Join-Path $smokeDir '_internal\external\ai4m-miros'
          $statusJson = Join-Path $env:RUNNER_TEMP 'miros-worker-missing-input-smoke.json'
          $probeMidi = Join-Path $env:RUNNER_TEMP 'miros-worker-missing-input-smoke.mid'
          $MirosWorkerTimeoutSeconds = 120
          Remove-Item -LiteralPath $statusJson, $probeMidi -ErrorAction SilentlyContinue
          Push-Location $mirosDir
          try {
            $args = @(
              '--miros-worker',
              '-i', (Join-Path $env:RUNNER_TEMP 'missing-miros-probe.wav'),
              '-o', $probeMidi,
              '--status-json', $statusJson
            )
            $worker = Start-Process -FilePath (Join-Path $smokeDir 'MusicToMidi.exe') -ArgumentList $args -PassThru
            if (-not $worker.WaitForExit($MirosWorkerTimeoutSeconds * 1000)) {
              try {
                $worker.Kill($true)
              } catch {
                $worker.Kill()
              }
              $statusText = if (Test-Path $statusJson) { Get-Content -LiteralPath $statusJson -Raw } else { "" }
              throw "MIROS worker missing-input smoke timed out after ${MirosWorkerTimeoutSeconds}s.`n$statusText"
            }
          } finally {
            Pop-Location
          }
          if (-not (Test-Path $statusJson)) {
            throw "MIROS worker missing-input smoke did not write a status file. ExitCode=$($worker.ExitCode)"
          }
          $mirosStatus = Get-Content -LiteralPath $statusJson -Raw
          if ($mirosStatus -notmatch '"ok": false') {
            throw "MIROS worker missing-input smoke returned an unexpected status:`n$mirosStatus"
          }
          if ($mirosStatus -notmatch 'MIROS input audio does not exist') {
            throw "MIROS worker missing-input smoke failed before the expected missing-input check:`n$mirosStatus"
          }

      - name: 烟测便携产物 (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 20
        run: |
          SMOKE_DIR="$(pwd)/dist/MusicToMidi"
          SMOKE_EXE="$SMOKE_DIR/MusicToMidi"
          export QT_QPA_PLATFORM=offscreen
          chmod +x "$SMOKE_EXE"
          SELF_TEST_TIMEOUT_SECONDS=900
          SELF_TEST_OUTPUT="${RUNNER_TEMP:-/tmp}/music-to-midi-self-test-output.log"
          MIROS_WORKER_TIMEOUT_SECONDS=120
          MIROS_WORKER_OUTPUT="${RUNNER_TEMP:-/tmp}/music-to-midi-miros-worker-output.log"
          dump_linux_portable_logs() {
            if [ -f "$SELF_TEST_OUTPUT" ]; then
              echo "=== Portable self-test output: $SELF_TEST_OUTPUT ===" >&2
              tail -n 200 "$SELF_TEST_OUTPUT" >&2 || true
            fi
            local log_dir="$SMOKE_DIR/runtime/logs"
            if [ -d "$log_dir" ]; then
              echo "=== Portable runtime logs: $log_dir ===" >&2
              find "$log_dir" -maxdepth 1 -type f -print -exec tail -n 200 {} \; >&2 || true
            else
              echo "No portable runtime log directory found: $log_dir" >&2
            fi
          }
          dump_miros_worker_logs() {
            if [ -f "$MIROS_WORKER_OUTPUT" ]; then
              echo "=== MIROS worker output: $MIROS_WORKER_OUTPUT ===" >&2
              tail -n 200 "$MIROS_WORKER_OUTPUT" >&2 || true
            fi
            if [ -f "$STATUS_JSON" ]; then
              echo "=== MIROS worker status: $STATUS_JSON ===" >&2
              cat "$STATUS_JSON" >&2 || true
            fi
          }
          set +e
          timeout --signal=TERM --kill-after=30s "${SELF_TEST_TIMEOUT_SECONDS}s" \
            "$SMOKE_EXE" --self-test-no-load 2>&1 | tee "$SELF_TEST_OUTPUT"
          SELF_TEST_EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$SELF_TEST_EXIT" -eq 124 ] || [ "$SELF_TEST_EXIT" -eq 137 ]; then
            echo "Portable self-test timed out after ${SELF_TEST_TIMEOUT_SECONDS}s" >&2
            dump_linux_portable_logs
            exit 1
          fi
          if [ "$SELF_TEST_EXIT" -ne 0 ]; then
            echo "Portable self-test failed. ExitCode=${SELF_TEST_EXIT}" >&2
            dump_linux_portable_logs
            exit "$SELF_TEST_EXIT"
          fi
          if ! grep -R "便携包自检通过" "$SMOKE_DIR/runtime/logs" >/dev/null 2>&1; then
            echo "Portable self-test did not write the success marker to runtime logs" >&2
            dump_linux_portable_logs
            exit 1
          fi
          STATUS_JSON="${RUNNER_TEMP:-/tmp}/miros-worker-missing-input-smoke.json"
          PROBE_MIDI="${RUNNER_TEMP:-/tmp}/miros-worker-missing-input-smoke.mid"
          rm -f "$STATUS_JSON" "$PROBE_MIDI"
          pushd "$SMOKE_DIR/_internal/external/ai4m-miros"
          set +e
          timeout --signal=TERM --kill-after=30s "${MIROS_WORKER_TIMEOUT_SECONDS}s" "$SMOKE_EXE" \
            --miros-worker \
            -i "${RUNNER_TEMP:-/tmp}/missing-miros-probe.wav" \
            -o "$PROBE_MIDI" \
            --status-json "$STATUS_JSON" 2>&1 | tee "$MIROS_WORKER_OUTPUT"
          WORKER_EXIT=${PIPESTATUS[0]}
          set -e
          popd
          if [ "$WORKER_EXIT" -eq 124 ] || [ "$WORKER_EXIT" -eq 137 ]; then
            echo "MIROS worker missing-input smoke timed out after ${MIROS_WORKER_TIMEOUT_SECONDS}s" >&2
            dump_miros_worker_logs
            exit 1
          fi
          if [ ! -f "$STATUS_JSON" ]; then
            echo "MIROS worker missing-input smoke did not write a status file. ExitCode=${WORKER_EXIT}" >&2
            dump_miros_worker_logs
            exit 1
          fi
          if ! grep -q '"ok": false' "$STATUS_JSON"; then
            echo "MIROS worker missing-input smoke returned an unexpected status:" >&2
            dump_miros_worker_logs
            exit 1
          fi
          if ! grep -q 'MIROS input audio does not exist' "$STATUS_JSON"; then
            echo "MIROS worker missing-input smoke failed before the expected missing-input check:" >&2
            dump_miros_worker_logs
            exit 1
          fi
          rm -rf "$SMOKE_DIR/runtime"

      - name: 创建便携包 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "MusicToMidi-${{ matrix.platform }}-${{ matrix.variant }}"
          for ($attempt = 1; $attempt -le 10; $attempt++) {
            try {
              Move-Item -LiteralPath 'dist/MusicToMidi' -Destination "dist/$name"
              break
            } catch {
              if ($attempt -eq 10) {
                throw
              }
              Start-Sleep -Seconds 3
            }
          }
          Copy-Item -LiteralPath @('LICENSE', 'THIRD_PARTY_NOTICES.md', 'THIRD_PARTY_SBOM.txt', '.tmp/FFMPEG_BUILD_AUDIT.txt') -Destination "dist/$name" -Force

          $variantNote = @"
          GPU 版（CUDA 12.8），支持 NVIDIA 显卡加速
          需要与内置 PyTorch/CUDA 兼容的 NVIDIA 显卡；不兼容时会显式报错，不生成 CPU 版
          "@

          $readme = @"
          音乐转MIDI转换器 ${{ matrix.platform }} 便携版（${{ matrix.variant }}）

          使用方法：
            运行 MusicToMidi.exe 即可启动（AI 模型已内置，无需额外下载）

          $variantNote

          支持格式：MP3, WAV, FLAC, OGG, M4A 等
          输出格式：多轨道 MIDI（128 种 GM 乐器）

          处理模式（完整 7 种）：
            1. SMART：完整混音多乐器转写
            2. VOCAL_SPLIT：Leap XE 人声 + PolarFormer 伴奏，分离结果分别转写
            3. SIX_STEM_SPLIT：BS-RoFormer SW Fixed 六声部，每个 stem 独立转写并合并 MIDI
            4. PIANO_TRANSKUN：TransKun 2.0.1 默认 V2
            5. PIANO_TRANSKUN_V2_AUG：TransKun V2 Aug
            6. PIANO_ARIA_AMT：Aria-AMT
            7. PIANO_BYTEDANCE_PEDAL：ByteDance Piano（保留 CC64 踏板）

          后端选择：
            SMART / VOCAL_SPLIT / SIX_STEM_SPLIT 都可显式选择 YourMT3+ 或 MIROS。
            VOCAL_SPLIT 的人声/伴奏和 SIX_STEM_SPLIT 的六个 stem 都会各自调用所选后端，不是只对原混音转写一次。

          内置资产：YourMT3+ 5 个固定 checkpoint、MIROS 源码/两组权重、SW Fixed、Leap XE、PolarFormer、
            TransKun 默认 V2、TransKun V2 Aug、Aria-AMT 与 ByteDance Piano。

          无需安装 Python，解压即用
          "@
          Set-Content -LiteralPath "dist/$name/使用说明.txt" -Value $readme -Encoding UTF8

      - name: 创建便携包 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          NAME="MusicToMidi-${{ matrix.platform }}-${{ matrix.variant }}"
          # 重命名 dist/MusicToMidi 为带平台标识的名称
          mv dist/MusicToMidi "dist/${NAME}"
          cp LICENSE THIRD_PARTY_NOTICES.md THIRD_PARTY_SBOM.txt .tmp/FFMPEG_BUILD_AUDIT.txt "dist/${NAME}/"

          VARIANT_NOTE="GPU 版（CUDA 12.8），支持 NVIDIA 显卡加速
          需要与内置 PyTorch/CUDA 兼容的 NVIDIA 显卡；不兼容时会显式报错，不生成 CPU 版"

          if [ "${{ matrix.platform }}" = "Windows" ]; then
            EXE="MusicToMidi.exe"
          else
            EXE="MusicToMidi"
            chmod +x "dist/${NAME}/${EXE}"
          fi

          cat > "dist/${NAME}/使用说明.txt" << HEREDOC
          音乐转MIDI转换器 ${{ matrix.platform }} 便携版（${{ matrix.variant }}）

          使用方法：
            运行 ${EXE} 即可启动（AI 模型已内置，无需额外下载）

          ${VARIANT_NOTE}

          支持格式：MP3, WAV, FLAC, OGG, M4A 等
          输出格式：多轨道 MIDI（128 种 GM 乐器）

          处理模式（完整 7 种）：
            1. SMART：完整混音多乐器转写
            2. VOCAL_SPLIT：Leap XE 人声 + PolarFormer 伴奏，分离结果分别转写
            3. SIX_STEM_SPLIT：BS-RoFormer SW Fixed 六声部，每个 stem 独立转写并合并 MIDI
            4. PIANO_TRANSKUN：TransKun 2.0.1 默认 V2
            5. PIANO_TRANSKUN_V2_AUG：TransKun V2 Aug
            6. PIANO_ARIA_AMT：Aria-AMT
            7. PIANO_BYTEDANCE_PEDAL：ByteDance Piano（保留 CC64 踏板）

          后端选择：
            SMART / VOCAL_SPLIT / SIX_STEM_SPLIT 都可显式选择 YourMT3+ 或 MIROS。
            VOCAL_SPLIT 的人声/伴奏和 SIX_STEM_SPLIT 的六个 stem 都会各自调用所选后端，不是只对原混音转写一次。

          内置资产：YourMT3+ 5 个固定 checkpoint、MIROS 源码/两组权重、SW Fixed、Leap XE、PolarFormer、
            TransKun 默认 V2、TransKun V2 Aug、Aria-AMT 与 ByteDance Piano。

          无需安装 Python，解压即用
          HEREDOC

      - name: 压缩便携包
        shell: bash
        run: |
          NAME="MusicToMidi-${{ matrix.platform }}-${{ matrix.variant }}"
          SEVENZ_LOW_MEM_ARGS=(-t7z -mx=5 -md=64m -mmt=on)
          echo "压缩前磁盘空间:"
          df -h .

          # PyInstaller 构建完成后，build/ 中的中间产物和 staged model assets
          # 已经复制进 dist/${NAME}，压缩前清掉它们以降低 runner 磁盘峰值。
          rm -rf build
          rm -rf "$HOME/.cache/pip" "$HOME/.cache/torch" "$HOME/.cache/music_ai_models" "$HOME/.music-to-midi"
          echo "清理构建缓存后磁盘空间:"
          df -h .

          if [ "${{ matrix.platform }}" = "Windows" ]; then
            # 先检查未压缩目录大小，避免对大包做无意义的多轮压缩
            DIR_SIZE=$(du -sb "dist/${NAME}" | cut -f1)
            echo "未压缩目录大小: $(( DIR_SIZE / 1048576 )) MB"
            if [ "$DIR_SIZE" -gt 3000000000 ]; then
              # >3GB 目录直接用分卷 7z（跳过 zip 和单文件 7z）
              echo "目录较大，直接使用分卷 7z 压缩..."
              cd dist && 7z a "${SEVENZ_LOW_MEM_ARGS[@]}" -v1900m "../${NAME}-Portable.7z" "${NAME}" && cd ..
            else
              # 小包先试 zip
              cd dist && 7z a -tzip "../${NAME}-Portable.zip" "${NAME}" && cd ..
              FILE_SIZE=$(stat -c%s "${NAME}-Portable.zip" 2>/dev/null || wc -c < "${NAME}-Portable.zip" | tr -d ' ')
              if [ "$FILE_SIZE" -gt 1900000000 ]; then
                rm "${NAME}-Portable.zip"
                cd dist && 7z a "${SEVENZ_LOW_MEM_ARGS[@]}" "../${NAME}-Portable.7z" "${NAME}" && cd ..
                SEVENZ_SIZE=$(stat -c%s "${NAME}-Portable.7z" 2>/dev/null || wc -c < "${NAME}-Portable.7z" | tr -d ' ')
                if [ "$SEVENZ_SIZE" -gt 1900000000 ]; then
                  rm "${NAME}-Portable.7z"
                  cd dist && 7z a "${SEVENZ_LOW_MEM_ARGS[@]}" -v1900m "../${NAME}-Portable.7z" "${NAME}" && cd ..
                fi
              fi
            fi

            echo "校验 Windows 压缩包..."
            for archive in "${NAME}-Portable.zip" "${NAME}-Portable.7z" "${NAME}-Portable.7z.001"; do
              if [ -f "$archive" ]; then
                7z t "$archive"
              fi
            done
          else
            # Linux GPU 包较大，直接流式写入分卷，避免先生成一个完整 tar.gz
            # 再 split 造成额外磁盘峰值。
            tar -czf - -C dist "${NAME}" | split -b 1900M - "${NAME}-Portable.tar.gz.part"
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: MusicToMidi-${{ matrix.platform }}-${{ matrix.variant }}
          path: MusicToMidi-${{ matrix.platform }}-${{ matrix.variant }}-Portable*

  release:
    name: 上传到 GitHub Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: 检出发布源码
        uses: actions/checkout@v6

      - name: 下载所有构建产物
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: 列出构建产物
        run: ls -lh MusicToMidi-*

      - name: 确定目标标签
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            LATEST=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName')
            echo "tag=${LATEST}" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 校验 pyproject、运行时版本与发布标签一致
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          python - <<'PY'
          import ast
          import os
          import tomllib
          from pathlib import Path

          project_version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          module = ast.parse(Path("src/__init__.py").read_text(encoding="utf-8"))
          runtime_version = next(
              ast.literal_eval(node.value)
              for node in module.body
              if isinstance(node, ast.Assign)
              and any(isinstance(target, ast.Name) and target.id == "__version__" for target in node.targets)
          )
          release_tag = os.environ["RELEASE_TAG"].strip()
          expected_tag = f"v{project_version}"
          if runtime_version != project_version:
              raise SystemExit(
                  f"Version mismatch: pyproject.toml={project_version}, src.__version__={runtime_version}"
              )
          if release_tag != expected_tag:
              raise SystemExit(
                  f"Release tag mismatch: expected {expected_tag} from project version, got {release_tag!r}"
              )
          print(f"Version contract verified: {release_tag}")
          PY

      - name: 创建 Release（如不存在）
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if ! gh release view "${TAG}" --repo ${{ github.repository }} &>/dev/null; then
            gh release create "${TAG}" \
              --repo ${{ github.repository }} \
              --title "${TAG}" \
              --notes "正在准备发布说明..."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 更新 Release 说明
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          cat > release-notes.md << NOTES
          ## 音乐转MIDI转换器 ${TAG}

          ### 便携版下载

          | 文件 | 平台 | 推理方式 | 说明 |
          |------|------|----------|------|
          | \`MusicToMidi-Windows-GPU-Portable.*\` | Windows | GPU (CUDA 12.8) | 有 NVIDIA 显卡推荐 |
          | \`MusicToMidi-Linux-GPU-Portable.*\` | Linux | GPU (CUDA 12.8) | 有 NVIDIA 显卡推荐 |

          ### 使用方法
          1. 下载对应平台的 GPU 压缩包
          2. 如果是分卷压缩，请先下载同名前缀的全部分卷（如 \`.7z.001\` / \`.7z.002\` 或 \`.partaa\` / \`.partab\`）
          3. 解压到任意目录
          4. 运行 \`MusicToMidi\`（Windows 为 \`.exe\`）即可使用（AI 模型已内置）

          ### 说明
          - 无需安装 Python，解压即用
          - GPU 版内含 CUDA 12.8 运行时，无需单独安装 CUDA
          - 没有 NVIDIA 显卡，或当前显卡与内置 PyTorch/CUDA 不兼容时会显式报错；发布流程不再生成 CPU 版
          - 支持 128 种 GM 乐器精确识别
          - 当前包含 7 种处理模式：智能转写 / 人声分离 / 六声部分离 / TransKun 钢琴 / TransKun V2 Aug 钢琴 / Aria-AMT 钢琴 / ByteDance Pedal 钢琴

          ### 许可说明
          - 包内附带完整的 `THIRD_PARTY_NOTICES.md`（逐项来源、许可与署名）与 `THIRD_PARTY_SBOM.txt`（构建环境依赖清单）
          - 本包作为组合作品按 GPL-3.0 条款分发（含 PyQt6/Qt 组件），完整对应源代码与构建说明见本仓库
          - Aria-AMT checkpoint 按 CC BY-NC-SA 4.0 再分发（非商业用途、保留署名，见包内声明）
          - 个别未声明许可的上游权重（Leap XE、BS-RoFormer SW Fixed、MIROS）由维护者以署名方式分发，权利人可以随时通过 Issue 要求移除

          ### 系统要求
          - **Windows**：Windows 10/11 (x64)
          - **Linux**：Ubuntu 20.04+ / Debian 11+ (x64)
          - **GPU 版**：与内置 PyTorch/CUDA 兼容的 NVIDIA 显卡
          - **内存**：建议 8GB+
          NOTES
          gh release edit "${TAG}" \
            --repo ${{ github.repository }} \
            --title "${TAG}" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 删除旧 CPU 发布资产
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "清理 Release 中的旧 CPU 资产: ${TAG}"
          mapfile -t CPU_ASSETS < <(
            gh release view "${TAG}" \
              --repo ${{ github.repository }} \
              --json assets \
              -q '.assets[].name | select(test("^MusicToMidi-.*-CPU-Portable"))'
          )
          if [ "${#CPU_ASSETS[@]}" -eq 0 ]; then
            echo "未发现旧 CPU 资产"
            exit 0
          fi
          for asset in "${CPU_ASSETS[@]}"; do
            echo "删除旧 CPU 资产: ${asset}"
            gh release delete-asset "${TAG}" "${asset}" \
              --repo ${{ github.repository }} \
              --yes
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传资源到 Release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "上传资源到 Release: ${TAG}"
          mapfile -t FILES < <(find . -maxdepth 1 -name "MusicToMidi-*-Portable*" -type f | sort)
          upload_asset_with_retry() {
            local tag="$1"
            local file="$2"
            local attempt
            local exit_code

            for attempt in 1 2 3; do
              echo "上传(${attempt}/3): ${file}"
              if timeout 30m gh release upload "${tag}" "${file}" \
                --repo ${{ github.repository }} \
                --clobber; then
                return 0
              fi

              exit_code=$?
              echo "上传失败(退出码=${exit_code}): ${file}"
              if [ "${attempt}" -lt 3 ]; then
                sleep $(( attempt * 20 ))
              fi
            done

            echo "上传最终失败: ${file}"
            return 1
          }
          echo "找到以下文件："
          for f in "${FILES[@]}"; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            echo "  $f ($(( SIZE / 1048576 )) MB)"
          done
          for f in "${FILES[@]}"; do
            upload_asset_with_retry "${TAG}" "$f"
          done
          echo "全部上传完成"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
